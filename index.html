<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Luyện Nghe & Chép Chính Tả Nâng Cao</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }

        h2 {
            margin-top: 0;
            color: #0f172a;
            text-align: center;
            font-size: 24px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="number"] {
            flex: 1;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            padding: 14px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .main-layout {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .config-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary { background-color: #475569; }
        .btn-secondary:hover { background-color: #334155; }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #059669; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-warning:hover { background-color: #d97706; }
        .btn-info { background-color: #06b6d4; color: white; }
        .btn-info:hover { background-color: #0891b2; }

        .typing-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.5;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* Vùng hiển thị kết quả so màu */
        .result-display {
            padding: 15px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            background: #fafafa;
            min-height: 24px;
            font-size: 18px;
            line-height: 1.6;
        }

        .word-correct {
            color: var(--success);
            font-weight: bold;
            margin-right: 5px;
        }

        .word-incorrect {
            color: var(--danger);
            text-decoration: line-through;
            font-weight: bold;
            margin-right: 5px;
        }

        /* Khu vực tra cứu IPA */
        .ipa-section {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .guide-box {
            background-color: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 4px;
            font-size: 14px;
            color: #475569;
            line-height: 1.6;
        }

        .guide-box code {
            background: #e2e8f0;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #0f172a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Chép Chính Tả Tiếng Anh Qua YouTube</h2>
    
    <div class="input-group">
        <input type="text" id="youtubeUrl" placeholder="Dán link video tiếng Anh vào đây...">
        <button onclick="loadVideo()">Tải Bài Nghe</button>
    </div>

    <div class="main-layout" id="mainLayout">
        
        <div class="video-box">
            <div id="player"></div>
        </div>

        <div class="config-panel">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="font-weight: 500;">
                    <input type="checkbox" id="autoPauseCheck" onchange="toggleAutoPause()"> Tự động dừng video
                </label>
                <div id="timeSetting" style="display: none; align-items: center; gap: 5px;">
                    (sau mỗi <input type="number" id="pauseInterval" value="5" min="2" max="30" style="width: 50px; padding: 4px; text-align: center; border-radius: 4px; border: 1px solid var(--border);"> giây)
                </div>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
                <label style="font-weight: bold; font-size: 14px; color: #475569;">Nhập đoạn Phụ đề gốc (Script) của video tại đây để chấm điểm & gợi ý:</label>
                <input type="text" id="correctScript" placeholder="Ví dụ: Practice makes perfect. Spoken English will improve day by day.">
            </div>
        </div>

        <div class="controls">
